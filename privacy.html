<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Privacy Policy — GoldNova</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --gold:#C9A84C;
  --gold-light:#E8C97A;
  --gold-dim:#7A6230;
  --bg:#0A0A0B;
  --bg2:#111113;
  --bg3:#18181C;
  --border:#2A2A30;
  --text:#F0EDE6;
  --muted:#7A7870;
}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;font-weight:300;line-height:1.7;overflow-x:hidden}
h1,h2,h3{font-family:'Playfair Display',serif;font-weight:600}
nav{display:flex;justify-content:space-between;align-items:center;padding:1rem 4rem;border-bottom:1px solid var(--border);position:sticky;top:0;background:rgba(10,10,11,0.92);backdrop-filter:blur(12px);z-index:100}
.logo-text{font-family:'Playfair Display',serif;font-size:1.4rem;color:var(--gold);letter-spacing:0.02em;text-decoration:none}
.logo-text span{color:var(--text);font-weight:400}
.nav-cta{background:var(--gold);color:#000;padding:0.6rem 1.5rem;border-radius:4px;font-size:0.9rem;font-weight:500;text-decoration:none;transition:background 0.2s}
.nav-cta:hover{background:var(--gold-light)}
.container{max-width:800px;margin:0 auto;padding:5rem 4rem}
.page-label{font-size:0.75rem;letter-spacing:0.15em;text-transform:uppercase;color:var(--gold);margin-bottom:1rem}
h1{font-size:3rem;margin-bottom:0.5rem;line-height:1.2}
.last-updated{color:var(--muted);font-size:0.85rem;margin-bottom:3rem;padding-bottom:2rem;border-bottom:1px solid var(--border)}
.section{margin-bottom:2.5rem}
.section h2{font-size:1.3rem;color:var(--gold);margin-bottom:1rem;font-family:'DM Sans',sans-serif;font-weight:500}
.section p{color:var(--muted);font-size:0.95rem;line-height:1.8;margin-bottom:0.75rem}
.section ul{color:var(--muted);font-size:0.95rem;line-height:1.8;padding-left:1.5rem;margin-bottom:0.75rem}
.section ul li{margin-bottom:0.4rem}
.highlight-box{background:var(--bg3);border:1px solid var(--border);border-left:3px solid var(--gold);border-radius:8px;padding:1.25rem 1.5rem;margin-bottom:2rem}
.highlight-box p{color:var(--text);font-size:0.9rem;margin:0}
footer{padding:2rem 4rem;border-top:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;margin-top:4rem}
.footer-logo-text{font-family:'Playfair Display',serif;color:var(--gold);font-size:1.1rem}
.footer-links{display:flex;gap:1.5rem}
.footer-links a{color:var(--muted);font-size:0.85rem;text-decoration:none;transition:color 0.2s}
.footer-links a:hover{color:var(--text)}
</style>
</head>
<body>
<nav>
  <a href="index.html" class="logo-text">Gold<span>Nova</span></a>
  <a href="index.html#pricing" class="nav-cta">Get started</a>
</nav>
